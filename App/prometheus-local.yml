global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'techstock-app'
    static_configs:
      - targets: ['backend:3000']
    metrics_path: /metrics
  - job_name: 'node-monitoring'
    static_configs:
      - targets: ['localhost:9100']
