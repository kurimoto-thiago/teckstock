# =============================================================================
# prometheus.yml — TechStock Monitoring
# =============================================================================
# ANTES DE USAR: substitua BACKEND_PRIVATE_IP pelo IP privado do EC2-Backend
#   Encontre em: EC2 → Instances → techstock-backend → Private IPv4
#   Exemplo: 10.0.10.45
#
# Após editar:
#   sudo promtool check config /etc/prometheus/prometheus.yml
#   sudo systemctl restart prometheus
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'learnerlab'
    app:         'techstock'

scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── EC2 Monitoring — métricas do SO (este servidor) ────────────────────────
  - job_name: 'node-exporter-monitoring'
    static_configs:
      - targets: ['localhost:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement:  'monitoring'

  # ── EC2 Backend — métricas da aplicação Node.js ────────────────────────────
  # EDITE: substitua BACKEND_PRIVATE_IP pelo IP real
  - job_name: 'techstock-app'
    static_configs:
      - targets: ['BACKEND_PRIVATE_IP:3000']
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement:  'backend-app'

  # ── EC2 Backend — métricas do SO (node_exporter) ───────────────────────────
  # EDITE: substitua BACKEND_PRIVATE_IP pelo IP real
  - job_name: 'node-exporter-backend'
    static_configs:
      - targets: ['BACKEND_PRIVATE_IP:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement:  'backend'

  # ── EC2 Frontend — métricas do SO (descomente se versão EC2/ASG) ───────────
  # - job_name: 'node-exporter-frontend'
  #   static_configs:
  #     - targets: ['FRONTEND_PRIVATE_IP:9100']
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement:  'frontend'
