# Secret: dados sensíveis em base64
# Em produção real: use External Secrets Operator + AWS Secrets Manager
# Para gerar: echo -n "SenhaForte@2024!" | base64
apiVersion: v1
kind: Secret
metadata:
  name: techstock-secrets
  namespace: techstock
type: Opaque
data:
  # base64 de "SenhaForte@2024!" — substitua pelo valor real
  DB_PASSWORD: U2VuaGFGb3J0ZUAyMDI0IQ==
  # SUBSTITUA pelo base64 do DNS real do ALB:
  # echo -n "http://SEU-ALB.us-east-1.elb.amazonaws.com" | base64
  CORS_ORIGIN: aHR0cDovL1NFVV9BTEJfRE5T   # base64 de "http://SEU_ALB_DNS" — SUBSTITUA!
